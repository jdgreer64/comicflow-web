<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Returning to ComicFlow…</title>
    <meta http-equiv="refresh" content="0; url=comicflow://ebay-callback" id="meta" />
    <style>
      :root { color-scheme: dark; }
      body {
        font: 16px -apple-system, system-ui, sans-serif;
        background: #111;
        color: #eee;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
        padding: 20px;
      }
      .card { max-width: 420px; }
      .badge {
        display: inline-block;
        margin-bottom: 18px;
        padding: 6px 12px;
        border: 1px solid #7c3aed;
        border-radius: 8px;
        font-size: 11px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: #cdb6ee;
      }
      .returning { color: #aaa; font-size: 14px; margin: 16px 0 28px; }
      .btn {
        display: inline-block;
        padding: 18px 32px;
        background: #7c3aed;
        color: #fff;
        font-size: 18px;
        font-weight: 700;
        text-decoration: none;
        border-radius: 12px;
        box-shadow: 0 4px 18px rgba(124, 58, 237, 0.4);
        transition: transform 0.1s ease;
      }
      .btn:active { transform: scale(0.96); }
      .hint {
        margin-top: 22px;
        font-size: 12px;
        color: #888;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">eBay → ComicFlow bridge</div>
      <p class="returning">Returning to ComicFlow…</p>
      <a class="btn" id="link" href="comicflow://ebay-callback">
        Open ComicFlow
      </a>
      <p class="hint">
        If the app didn't open automatically, tap the button above.
        Then close this window.
      </p>
    </div>
    <script>
      // Forward eBay's OAuth callback (?code=… etc.) to the app's
      // custom URL scheme. Tries multiple redirect paths for
      // robustness — iOS sometimes blocks JS-driven custom-scheme
      // navigation inside in-app browsers (SFAuthenticationSession,
      // ASWebAuthenticationSession), but will accept it after a few
      // attempts and from a user-tapped link.
      (function () {
        var qs = window.location.search || '';
        var hash = window.location.hash || '';
        var target = 'comicflow://ebay-callback' + qs + hash;

        // 1. Update the meta-refresh + visible link to carry the
        // eBay-supplied code through.
        var meta = document.getElementById('meta');
        if (meta) meta.setAttribute('content', '0; url=' + target);
        var link = document.getElementById('link');
        if (link) link.setAttribute('href', target);

        // 2. Immediate location.replace — works inside ASWebAuth on
        // most iOS versions.
        try { window.location.replace(target); } catch (e) {}

        // 3. After 250ms, try assigning .href as a backup. Some
        // iOS sandboxes block .replace but allow .href.
        setTimeout(function () {
          try { window.location.href = target; } catch (e) {}
        }, 250);

        // 4. After 600ms, try a synthetic click on the visible link.
        // ASWebAuthenticationSession treats a link click on the page
        // as effectively user-driven and reliably navigates to the
        // custom scheme, closing the auth window automatically.
        setTimeout(function () {
          try {
            if (link) link.click();
          } catch (e) {}
        }, 600);
      })();
    </script>
  </body>
</html>
