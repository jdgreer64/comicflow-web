<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Returning to ComicFlow…</title>
    <meta http-equiv="refresh" content="0; url=comicflow://ebay-callback" id="meta" />
    <style>
      body {
        font: 15px -apple-system, system-ui, sans-serif;
        background: #111;
        color: #eee;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
        padding: 20px;
      }
      a {
        color: #7c3aed;
        font-weight: 700;
      }
      .badge {
        display: inline-block;
        margin-bottom: 18px;
        padding: 6px 12px;
        border: 1px solid #7c3aed;
        border-radius: 8px;
        font-size: 11px;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        color: #cdb6ee;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="badge">eBay → ComicFlow bridge</div>
      <p>Returning to ComicFlow…</p>
      <p>
        <a id="link" href="comicflow://ebay-callback"
          >Tap here if it doesn&rsquo;t open automatically</a
        >
      </p>
    </div>
    <script>
      // Forward eBay's OAuth callback (?code=… etc.) to the app's
      // custom URL scheme. This bridge exists because eBay requires
      // HTTPS redirect URLs and won't accept comicflow:// directly.
      // Hosted free on GitHub Pages from the ComicFlow repo.
      (function () {
        var qs = window.location.search || '';
        var hash = window.location.hash || '';
        var target = 'comicflow://ebay-callback' + qs + hash;
        var meta = document.getElementById('meta');
        if (meta) meta.setAttribute('content', '0; url=' + target);
        var link = document.getElementById('link');
        if (link) link.setAttribute('href', target);
        try {
          window.location.replace(target);
        } catch (e) {
          // location.replace is blocked in some browsers when the
          // scheme isn't registered (desktop). The visible link is the
          // fallback; meta-refresh will also try.
        }
      })();
    </script>
  </body>
</html>
